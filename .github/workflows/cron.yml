name: Hourly check

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/check
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          [ -n "$APP_URL" ] || { echo "APP_URL secret missing"; exit 1; }
          [ -n "$CRON_SECRET" ] || { echo "CRON_SECRET secret missing"; exit 1; }
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST "$APP_URL/api/cron/check" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "HTTP $response"
          cat /tmp/body
          [ "$response" = "200" ]
